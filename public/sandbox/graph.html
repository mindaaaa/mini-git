<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>mini-git · sandbox · graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/sandbox/_shared.css" />
<link rel="stylesheet" href="/styles.css" />
<style>
  body { overflow: auto; height: auto; background: var(--sb-bg); background-image: none; color: var(--sb-fg); }

  .stage {
    background: var(--void);
    background-image:
      radial-gradient(ellipse at 18% 22%, rgba(128, 255, 234, .07), transparent 55%),
      radial-gradient(ellipse at 82% 78%, rgba(255, 126, 182, .05), transparent 60%);
    border: 1px solid var(--sb-line);
    margin: 0 32px 32px;
    overflow: hidden;
  }
  .stage .frame {
    position: relative;
    overflow: auto;
    max-height: 70vh;
  }
  .stage .frame.graph-area {
    /* sandbox 한정: padding 동일하게, position relative는 renderer가 다시 세팅 */
    padding: 40px 40px;
  }

  .controls {
    display: flex;
    gap: 12px;
    padding: 14px 32px 18px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls button {
    background: transparent;
    border: 1px solid var(--sb-line-2);
    color: var(--sb-fg-dim);
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .controls button:hover {
    border-color: var(--sb-accent);
    color: var(--sb-accent);
  }
  .controls .meta {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sb-fg-mute);
  }
  .controls .meta b { color: var(--sb-accent); font-weight: 500; }

  .selected-info {
    margin: 0 32px 32px;
    padding: 16px 22px;
    border: 1px dashed var(--sb-line);
    background: var(--sb-bg-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--sb-fg);
    line-height: 1.7;
  }
  .selected-info .empty { color: var(--sb-fg-mute); font-style: italic; }
  .selected-info b { color: var(--sb-accent); font-weight: 500; }
</style>
</head>
<body class="theme-constellation">

<div class="sb-bar">
  <a href="/sandbox/index.html">sandbox</a>
  <span class="sep">/</span>
  <span class="here">graph</span>
  <span class="meta">step 04 · full constellation graph</span>
</div>

<div class="sb-intro">
  <h1>full <em>graph</em></h1>
  <p>
    <code>renderConstellationGraph()</code> 모듈을 mock 6-commit 상태로 직접 호출.
    실제 운영에서 <code>app.js</code>가 호출하는 함수와 동일하므로,
    여기서 보이는 그래프가 메인 playground에서도 똑같이 보여야 한다.
    노드 클릭 시 아래 패널에서 선택 상태 확인.
  </p>
</div>

<div class="controls">
  <button id="btn-reset">초기 상태</button>
  <button id="btn-select-head">HEAD 선택</button>
  <button id="btn-select-feat">feature tip 선택</button>
  <span class="meta">commits: <b>6</b> · branches: <b>2</b> · HEAD: <b>main</b></span>
</div>

<div class="stage">
  <div id="graph-area" class="frame graph-area"></div>
</div>

<div class="selected-info" id="selected-info">
  <span class="empty">노드를 클릭해보세요.</span>
</div>

<script type="module">
  import { mockUiState } from '/sandbox/mock-state.js';
  import { renderConstellationGraph } from '/graph-constellation.js';

  const area = document.getElementById('graph-area');
  const info = document.getElementById('selected-info');
  let selectedHash = null;

  function paint() {
    renderConstellationGraph(area, mockUiState, {
      selectedHash,
      onSelect: (hash) => {
        selectedHash = hash;
        const c = mockUiState.graph.find((x) => x.hash === hash);
        if (c) {
          info.innerHTML = `
            <div><b>selected</b> · ${c.hash.slice(0, 7)}…</div>
            <div>message · ${c.message}</div>
            <div>parent &nbsp;· ${c.parent ? c.parent.slice(0, 7) + '…' : '(root)'}</div>
            <div>time &nbsp;&nbsp;&nbsp;· ${c.timestamp}</div>
          `;
        }
        paint();
      },
    });
  }
  paint();

  document.getElementById('btn-reset').addEventListener('click', () => {
    selectedHash = null;
    info.innerHTML = '<span class="empty">노드를 클릭해보세요.</span>';
    paint();
  });
  document.getElementById('btn-select-head').addEventListener('click', () => {
    const head = mockUiState.head;
    selectedHash = head.hash;
    const c = mockUiState.graph.find((x) => x.hash === head.hash);
    info.innerHTML = `
      <div><b>selected</b> · ${c.hash.slice(0, 7)}… (HEAD)</div>
      <div>message · ${c.message}</div>
      <div>parent &nbsp;· ${c.parent.slice(0, 7)}…</div>
      <div>time &nbsp;&nbsp;&nbsp;· ${c.timestamp}</div>
    `;
    paint();
  });
  document.getElementById('btn-select-feat').addEventListener('click', () => {
    const featBranch = mockUiState.refs.branches.find((b) => b.name === 'feature');
    selectedHash = featBranch.hash;
    const c = mockUiState.graph.find((x) => x.hash === featBranch.hash);
    info.innerHTML = `
      <div><b>selected</b> · ${c.hash.slice(0, 7)}… (feature tip)</div>
      <div>message · ${c.message}</div>
      <div>parent &nbsp;· ${c.parent.slice(0, 7)}…</div>
      <div>time &nbsp;&nbsp;&nbsp;· ${c.timestamp}</div>
    `;
    paint();
  });
</script>

</body>
</html>
